name: Deploy

on:
  # Trigger manually with an image tag to deploy
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Docker image tag (git SHA) to deploy"
        required: true
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      topology:
        description: "Deployment topology"
        required: true
        default: ec2
        type: choice
        options:
          - ec2
          - standalone
          - split
      tier:
        description: "Scale tier (ignored for ec2 topology)"
        required: false
        default: hobby
        type: choice
        options:
          - hobby
          - moderate
          - production

permissions:
  contents: read
  id-token: write

jobs:
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Check required secrets
        env:
          ROLE_ARN: ${{ secrets.AWS_CDK_DEPLOY_ROLE_ARN }}
        run: |
          if [ -z "$ROLE_ARN" ]; then
            echo "::error::Missing required secret: AWS_CDK_DEPLOY_ROLE_ARN"
            echo "::error::See docs/DEPLOYMENT.md §3 (One-Time AWS Bootstrap) for setup instructions."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CDK_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: CDK deploy (staging)
        working-directory: infra
        env:
          ECR_REPO: ${{ secrets.ECR_REPO_NAME }}
          LORE_URL: ${{ secrets.LORE_CONFIG_URL }}
          ZONES_URL: ${{ secrets.WORLD_ZONES_BASE_URL }}
        run: |
          ARGS="--context topology=${{ inputs.topology || 'ec2' }}"
          ARGS="$ARGS --context tier=${{ inputs.tier || 'hobby' }}"
          ARGS="$ARGS --context imageTag=${{ inputs.image-tag }}"
          ARGS="$ARGS --context ecrRepo=${ECR_REPO:-ambonmud/app}"
          [ -n "$LORE_URL" ]           && ARGS="$ARGS --context loreConfigUrl=$LORE_URL"
          [ -n "$ZONES_URL" ]          && ARGS="$ARGS --context worldZonesBaseUrl=$ZONES_URL"
          [ -n "${{ vars.HOSTNAME }}" ] && ARGS="$ARGS --context hostname=${{ vars.HOSTNAME }}"
          [ -n "${{ vars.DOMAIN }}" ]   && ARGS="$ARGS --context domain=${{ vars.DOMAIN }}"
          npx cdk deploy --all --require-approval never $ARGS

  deploy-production:
    name: Deploy to production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production   # requires manual approval in GitHub Environments
    if: >
      github.event_name == 'workflow_dispatch' &&
      inputs.environment == 'production'
    steps:
      - name: Check required secrets
        env:
          ROLE_ARN: ${{ secrets.AWS_CDK_DEPLOY_ROLE_ARN_PROD }}
        run: |
          missing=""
          [ -z "$ROLE_ARN" ]              && missing="$missing AWS_CDK_DEPLOY_ROLE_ARN_PROD"
          [ -z "${{ vars.DOMAIN }}" ]     && missing="$missing DOMAIN"
          if [ -n "$missing" ]; then
            echo "::error::Missing required config:$missing"
            echo "::error::See docs/DEPLOYMENT.md §3 (One-Time AWS Bootstrap) for setup instructions."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CDK_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: CDK deploy (production)
        env:
          ECR_REPO: ${{ secrets.ECR_REPO_NAME }}
        run: |
          npx cdk deploy --all --require-approval never \
            --context topology=split \
            --context tier=${{ inputs.tier || 'production' }} \
            --context imageTag=${{ inputs.image-tag }} \
            --context ecrRepo=${ECR_REPO:-ambonmud/app} \
            --context domain=${{ vars.DOMAIN }} \
            --context alertEmail=${{ vars.ALERT_EMAIL }}
        working-directory: infra

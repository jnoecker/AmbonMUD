name: Deploy Demo

# Runs automatically after every successful CI build on main.
# SSMs into the EC2 demo instance and calls `update-ambonmud <sha>` —
# pulls the new image and restarts the systemd service in-place, so
# player YAML data on /app/data is never touched.
#
# Prerequisites (one-time setup — see docs/DEPLOYMENT.md#demo-setup):
#   GitHub secrets:
#     AWS_EC2_DEMO_ROLE_ARN   IAM role ARN allowed to SSM into the demo instance
#     DEMO_INSTANCE_ID        EC2 instance ID (e.g. i-0abc123def456789a)
#   GitHub variables:
#     AWS_REGION              AWS region (default: us-east-1)

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Docker image tag (git SHA) to deploy. Defaults to HEAD of main."
        required: false

  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-demo
  cancel-in-progress: true    # only the latest image matters for demo

permissions:
  contents: read
  id-token: write   # required for OIDC AWS credential federation

jobs:
  deploy-demo:
    name: Update demo instance
    runs-on: ubuntu-latest
    # Only run if CI passed (or manually triggered).
    # DEMO_INSTANCE_ID is checked at runtime since secrets can't be used in if: conditions.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Check required secrets
        env:
          INSTANCE_ID: ${{ secrets.DEMO_INSTANCE_ID }}
          ROLE_ARN: ${{ secrets.AWS_EC2_DEMO_ROLE_ARN }}
        run: |
          if [ -z "$INSTANCE_ID" ] || [ -z "$ROLE_ARN" ]; then
            echo "::notice::Demo deployment skipped — DEMO_INSTANCE_ID or AWS_EC2_DEMO_ROLE_ARN not configured"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        id: check

      - name: Configure AWS credentials (OIDC)
        if: steps.check.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_EC2_DEMO_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Resolve image tag
        if: steps.check.outputs.skip != 'true'
        id: tag
        run: |
          if [ -n "${{ inputs.image-tag }}" ]; then
            echo "tag=${{ inputs.image-tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Send update command via SSM
        if: steps.check.outputs.skip != 'true'
        id: ssm
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          INSTANCE_ID: ${{ secrets.DEMO_INSTANCE_ID }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"docker system prune -af && update-ambonmud $IMAGE_TAG\"]" \
            --comment "Auto-deploy $IMAGE_TAG from GitHub Actions" \
            --query "Command.CommandId" \
            --output text)
          echo "command-id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "Sent SSM command: $COMMAND_ID"

      - name: Wait for update to complete
        if: steps.check.outputs.skip != 'true'
        env:
          COMMAND_ID: ${{ steps.ssm.outputs.command-id }}
          INSTANCE_ID: ${{ secrets.DEMO_INSTANCE_ID }}
        run: |
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

      - name: Print update output
        if: always() && steps.check.outputs.skip != 'true'
        env:
          COMMAND_ID: ${{ steps.ssm.outputs.command-id }}
          INSTANCE_ID: ${{ secrets.DEMO_INSTANCE_ID }}
        run: |
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "[Status, StatusDetails, StandardOutputContent, StandardErrorContent]" \
            --output text

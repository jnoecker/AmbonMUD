rooms:
  entrance:
    image: 373654bfc27c78ce430e2ac528015d141081e55bce71a940dd8a7d0c3409a308.jpg
    title: "Entrance"
    description: "A grand marble atrium with softly glowing crystal displays. Enchanted portraits line the walls, depicting adventurers of every race and calling."
    exits:
      n: novice_hall
  novice_hall:
    image: 69e0cbc1c8591e8c272b5f1a9d45642d8b1266dbf76b17f565358914cbcefbc1.jpg
    title: "Novice Hall"
    description: "A warm corridor lined with training dummies and practice targets. The air smells of fresh leather and chalk."
    exits:
      s: entrance
      n: apprentice_hall
      e: novice_warriors
      w: novice_mages
      u: novice_clerics
      d: novice_rogues
  apprentice_hall:
    image: a57c500b94e3222e287e698b3f1a9bd6007441efedac54ee31ad34392562a87f.jpg
    title: "Apprentice Hall"
    description: "A wider passage with polished stone floors and mounted weapons behind glass. Faint battle sounds echo from adjacent chambers."
    exits:
      s: novice_hall
      n: journeyman_hall
      e: apprentice_warriors
      w: apprentice_mages
      u: apprentice_clerics
      d: apprentice_rogues
  journeyman_hall:
    image: bcb26dfbc44208cb66383dc663157e1c53421b4adbd560604761d67cdf5fc459.jpg
    title: "Journeyman Hall"
    description: "An impressive gallery with vaulted ceilings and enchanted tapestries depicting famous battles. Arcane lanterns cast a steady glow."
    exits:
      s: apprentice_hall
      n: expert_hall
      e: journeyman_warriors
      w: journeyman_mages
      u: journeyman_clerics
      d: journeyman_rogues
  expert_hall:
    image: e175d3b2c425093285015477eb81a305c54910390bca46f54b49c06ca4a5479d.jpg
    title: "Expert Hall"
    description: "A prestigious corridor of dark oak and silver filigree. Trophy cases display legendary artifacts and commendations."
    exits:
      s: journeyman_hall
      n: master_hall
      e: expert_warriors
      w: expert_mages
      u: expert_clerics
      d: expert_rogues
  master_hall:
    image: 3223f491d21b88c273163570fd729a5681ee3fa7c725656a7e95fb2e5efaf0b7.jpg
    title: "Master Hall"
    description: "A resplendent hall of gleaming obsidian and gold inlay. The air hums with barely contained power."
    exits:
      s: expert_hall
      n: legend_hall
      e: master_warriors
      w: master_mages
      u: master_clerics
      d: master_rogues
  legend_hall:
    image: 2017b50b466e81f08063f7cb96271ac946881a5285c802fe6e73ba7908a6cb03.jpg
    title: "Legend Hall"
    description: "An ethereal sanctuary where reality shimmers at the edges. Constellations drift across the ceiling, and the floor seems to float above an endless void."
    exits:
      s: master_hall
      n: staff_hall
      e: legend_warriors
      w: legend_mages
      u: legend_clerics
      d: legend_rogues
  novice_warriors:
    image: d08fe2f0b2f370c06185de9d776520b8ed9036a4486324cfb2e473af79cc5a22.jpg
    title: "Novice Warriors"
    description: "A dusty training yard with wooden swords and straw dummies. Young recruits practice basic stances."
    exits:
      w: novice_hall
  novice_mages:
    image: 2bbdbe36774e46ae569c31f4ac5b6ddec70e9843b5c110deaf0122cbfbcb8b9a.jpg
    title: "Novice Mages"
    description: "A cramped study filled with primer spellbooks and sputtering candles. Apprentices struggle with basic incantations."
    exits:
      e: novice_hall
  novice_clerics:
    image: 2621dcb51226327935289ba10184367628e7bc8c97a97895f56f0ab7143bfc5c.jpg
    title: "Novice Clerics"
    description: "A humble chapel with simple wooden pews and a small altar. Acolytes kneel in quiet prayer."
    exits:
      d: novice_hall
  novice_rogues:
    image: acc365430ba797f5cae0bce9f8ccf4e058c14d7abf48f9fe0063204984d2f4ac.jpg
    title: "Novice Rogues"
    description: "A shadowy alcove with lockpick sets and rope coils scattered about. Fledgling thieves practice sleight of hand."
    exits:
      u: novice_hall
  apprentice_warriors:
    image: 5822857f14c7d81cc48bee8c14039aada972236ab63e030875a172cbaf7beae7.jpg
    title: "Apprentice Warriors"
    description: "A proper armory with iron weapons and training rings. Soldiers spar with disciplined form."
    exits:
      w: apprentice_hall
  apprentice_mages:
    image: a3a4abb41908b2d4f61dbee44313b7d9ba723c00f49b51c59f1c4865674f64eb.jpg
    title: "Apprentice Mages"
    description: "A well-stocked library with glowing runes etched into the reading desks. Channelers weave threads of mana."
    exits:
      e: apprentice_hall
  apprentice_clerics:
    image: b714e795e9a1b6f76837dc919f0740adb85ee8b4ac507b756ce77828228cf76f.jpg
    title: "Apprentice Clerics"
    description: "A serene sanctuary with stained glass windows casting colored light. Healers tend to minor wounds."
    exits:
      d: apprentice_hall
  apprentice_rogues:
    image: 73f22381c6052e02d53479f9a8846db5218c4b8cb6a59bad4a5d9eb39c7b48e6.jpg
    title: "Apprentice Rogues"
    description: "A dimly lit den with targets, tripwires, and hidden compartments. Thieves hone their craft in silence."
    exits:
      u: apprentice_hall
  journeyman_warriors:
    image: 20fcf210f69e11559bd8da48bdd46c3b6be773146e8383bc3114804de72c2a77.jpg
    title: "Journeyman Warriors"
    description: "A battle-scarred arena with enchanted training golems. Knights test their mettle against formidable opponents."
    exits:
      w: journeyman_hall
  journeyman_mages:
    image: 68adfda0dc11a187311e5d9f876c302354467f39d898725a90e6601e0b2b1eb1.jpg
    title: "Journeyman Mages"
    description: "A conjuration chamber crackling with residual energy. Conjurers summon elemental wisps that dance through the air."
    exits:
      e: journeyman_hall
  journeyman_clerics:
    image: f189773dd8c8605a195abcbab071b380d16325ebd07516e2d62777cbbcfc3b91.jpg
    title: "Journeyman Clerics"
    description: "A radiant temple with floating prayer beads and divine sigils. Priests channel healing light with practiced ease."
    exits:
      d: journeyman_hall
  journeyman_rogues:
    image: ba92dcef6faed6a5a8865efe209078a3bce19f416ba0c2d9d2efa5b2283eff55.jpg
    title: "Journeyman Rogues"
    description: "A labyrinthine vault of shifting walls and concealed traps. Assassins move like whispers through the maze."
    exits:
      u: journeyman_hall
  expert_warriors:
    image: 2117c06ee84d872619cc8b8bc3853bbc13fc9665f78550ac28f28e124f45f574.jpg
    title: "Expert Warriors"
    description: "A war room with enchanted battle maps and masterwork weapons. Champions bear the scars of countless victories."
    exits:
      w: expert_hall
  expert_mages:
    image: 6f70bcb2094b768ba8d9d9ec5e4b8ce990edd568ead9af6b89cc361f4a3221a8.jpg
    title: "Expert Mages"
    description: "An arcane sanctum where spell circles burn permanently into the floor. Sorcerers command devastating magical forces."
    exits:
      e: expert_hall
  expert_clerics:
    image: 0ac5a910af0182e71be7b3b6d07f746d6b4bde6cf511caa63c61f53b76f8b264.jpg
    title: "Expert Clerics"
    description: "A blessed cathedral resonating with divine harmonics. Templars radiate an aura of holy protection."
    exits:
      d: expert_hall
  expert_rogues:
    image: d9b68fa6387ecf135417c04fae937d8f6c9fbd6427fabb18e6e4b5deddbd9610.jpg
    title: "Expert Rogues"
    description: "A vault of absolute darkness pierced only by the glint of poisoned blades. Shadows move with lethal purpose."
    exits:
      u: expert_hall
  master_warriors:
    image: 8c20d228cd5367f558be2dda6ef8f41eaeec42ca684f2479d371c0ecfca71228.jpg
    title: "Master Warriors"
    description: "A legendary forge-arena where enchanted weapons clash with thunderous force. Warlords command the very essence of combat."
    exits:
      w: master_hall
  master_mages:
    image: f616be187a5fe160eeb3e51bf28e69fe6313d2af71070c5146bbd75ee2d3c070.jpg
    title: "Master Mages"
    description: "A reality-bending sanctum where space folds and time stutters. Wizards reshape the fabric of existence."
    exits:
      e: master_hall
  master_clerics:
    image: 42f8a46e87192c3452fb692e01006ec7783bdd3a3cbac8fe06e59e892c3593b7.jpg
    title: "Master Clerics"
    description: "A celestial observatory bathed in divine radiance. Bishops commune directly with higher powers."
    exits:
      d: master_hall
  master_rogues:
    image: c4e41e5b8f2eb48ae54d67713a3d94ea59b0da2070e56e7cfeceade06e40349f.jpg
    title: "Master Rogues"
    description: "A chamber that seems to exist between moments. Nightblades phase through solid matter at will."
    exits:
      u: master_hall
  legend_warriors:
    image: e5df9b6fb21c5a3bf9051c5aaec3fef2be19a78bfbd7bfd3e810195953662bcc.jpg
    title: "Legend Warriors"
    description: "A mythic colosseum suspended among storm clouds. Warlords of godslaying renown stand as monuments to martial perfection."
    exits:
      w: legend_hall
  legend_mages:
    image: 60c90bccd45ac23f95eddedc0745ac500b403d751aba488459956605e74f134c.jpg
    title: "Legend Mages"
    description: "A nexus of pure magical energy where archmages exist as living spells. Reality itself bends to their will."
    exits:
      e: legend_hall
  legend_clerics:
    image: 5b3a650e29e87acacd8d28298697ae9e2ac8b20b9132acb393beb68f5c167aa6.jpg
    title: "Legend Clerics"
    description: "A fragment of the divine plane made manifest. Prophets glow with the light of celestial ascension."
    exits:
      d: legend_hall
  legend_rogues:
    image: e9fc26b7047d0c0fc6b2a5dbc48719cfba5ddaa0d244e883f6e8c8163af3ce19.jpg
    title: "Legend Rogues"
    description: "A void between worlds where shadowlords rule the spaces between shadows. Even light fears to enter."
    exits:
      u: legend_hall

  staff_hall:
    image: 22931a32abe1abd5a1d8b988d3a85eba6e0ee5f0c56c9227becffbcf7465d363.jpg
    title: "Staff Hall"
    description: "A transcendent chamber beyond mortal comprehension. The walls are woven from living starlight and the floor pulses with the heartbeat of the world itself. Only those who have surpassed legend dare enter."
    exits:
      s: legend_hall
      e: staff_warriors
      w: staff_mages
      u: staff_clerics
      d: staff_rogues
  staff_warriors:
    image: 4f89ee0bb438b97b5bb91c6afa2dbfb524090b731d04d6947c76f89471580a7a.jpg
    title: "Staff Warriors"
    description: "An infinite battlefield where the greatest warriors across all timelines clash in eternal combat. The very concept of defeat has been banished from this place."
    exits:
      w: staff_hall
  staff_mages:
    image: 179d4a2f52f9c1abe519c1da5592c9ac40070f151646cafc7d4fd69a8d57ba10.jpg
    title: "Staff Mages"
    description: "A dimension of pure arcane energy where reality is merely a suggestion. Spells of world-shaping magnitude orbit like lazy fireflies."
    exits:
      e: staff_hall
  staff_clerics:
    image: db18ff704176bfaf6e470156548129ade6c6b6e80bf5df28ae6858f43d8ddf91.jpg
    title: "Staff Clerics"
    description: "The throne room of divinity itself, where mortal and celestial merge into one. Pillars of crystallized prayer support a ceiling of infinite sky."
    exits:
      d: staff_hall
  staff_rogues:
    image: ccfe94b842fb169c922b3071ee8cd9d1fc76e05852df9339b9d30d969ff00d68.jpg
    title: "Staff Rogues"
    description: "A paradox of space that exists everywhere and nowhere simultaneously. Masters of shadow have transcended the boundary between seen and unseen."
    exits:
      u: staff_hall

